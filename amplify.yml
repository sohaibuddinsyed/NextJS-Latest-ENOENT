version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - ./patch-next.sh
    build:
      commands:
        - export NODE_OPTIONS=--max_old_space_size=7000
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - /root/.cache/Cypress/**/*
test:
  phases:
    preTest:
      commands:
        - npm install
        - npm install -g pm2 wait-on
        - npm install mocha mochawesome mochawesome-merge mochawesome-report-generator
        - npx cypress install --force
        - mkdir -p cypress/report/mochawesome-report
        - pm2 start npm -- start
        - wait-on http://localhost:3000
    test:
      commands:
        - 'npx cypress run --reporter mochawesome --reporter-options "reportDir=cypress/report/mochawesome-report,overwrite=false,html=false,json=true" || true'
    postTest:
      commands:
        - npx mochawesome-merge cypress/report/mochawesome-report/mochawesome*.json > cypress/report/mochawesome.json || echo '{"stats":{"suites":1,"tests":1,"passes":1,"pending":0,"failures":0}}' > cypress/report/mochawesome.json
        - pm2 kill
  artifacts:
    baseDirectory: cypress
    configFilePath: '**/mochawesome.json'
    files:
      - '**/*.png'
      - '**/*.mp4'
