version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NODE_OPTIONS='--max-old-space-size=7000'
        - npm install
    build:
      commands:
        # Run heap profiler during build
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/* 
